<!-- HERO -->

    <input type="text" id="name" placeholder="Name" class="w-full p-2 rounded-lg border focus:ring-2 focus:ring-purple-400" required>
    <input type="text" id="skill" placeholder="Skill" class="w-full p-2 rounded-lg border focus:ring-2 focus:ring-purple-400" required>
    <input type="email" id="email" placeholder="Email" class="w-full p-2 rounded-lg border focus:ring-2 focus:ring-purple-400" required>
    <input type="text" id="resume" placeholder="Resume Link" class="w-full p-2 rounded-lg border focus:ring-2 focus:ring-purple-400">
    <textarea id="intro" placeholder="Self Introduction" class="w-full p-2 rounded-lg border focus:ring-2 focus:ring-purple-400"></textarea>

    <button class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-2 rounded-lg hover:scale-105 transition">
      Submit
    </button>

  </form>
</section>
